name: refresh-dashboard
# يحدّث الرابط المنشور تلقائياً في سحابة GitHub — والماك مقفل.
# يحتاج: تفعيل Actions + (مستحسن) سرّ FINNHUB_API_KEY مجاني، و/أو FMP_API_KEY.
on:
  schedule:
    # يتحدّث «كل شوي» تلقائياً (المستودع عام → دقائق Actions مجانية بلا حد):
    - cron: "*/30 13-21 * * 1-5"   # كل 30 دقيقة وقت السوق الأمريكي (UTC)، أيام الأسبوع
    - cron: "0 */3 * * *"          # كل 3 ساعات بقية الوقت (أخبار الليل + نهاية الأسبوع)
  workflow_dispatch: {}        # زر تشغيل يدوي
permissions:
  contents: write
concurrency:
  group: refresh-dashboard
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install deps
        run: pip install -r requirements.txt
      - name: regenerate — cloud refresh (cache + live prices via Finnhub; yfinance is cloud-blocked)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          # NO failure mask: a hard crash (import/syntax/runtime regression) should FAIL loudly (red ✗)
          # so it's visible — the live link stays at the last good snapshot because the commit step below
          # won't run. Transient live-fetch failures are handled INSIDE the app (it renders from cache, exit 0).
          python src/main.py --cloud --no-trackers
      - name: stage snapshot
        run: |
          mkdir -p docs
          for f in index aggressive conservative planner; do
            [ -f "output/$f.html" ] && cp "output/$f.html" "docs/$f.html" || true
          done
      - name: commit if changed (a failed fetch never breaks the live link)
        run: |
          git config user.name "mazer-cloud"
          git config user.email "cloud@users.noreply.github.com"
          # commit docs AND the cloud-owned regime/desk state so the FSM trend/episode memory
          # PERSISTS across runs (otherwise every cloud run cold-starts and the smart regime is defeated).
          git add docs
          git add -f data/_state/regime_history.json data/_state/desk_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no change — link left as-is"
          else
            git commit -m "cloud refresh $(date -u +%FT%TZ)"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
