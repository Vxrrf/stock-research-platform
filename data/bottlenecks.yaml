# ════════════════════════════════════════════════════════════════════
#  bottlenecks.yaml — خريطة «عنق الزجاجة» عبر القطاعات
#
#  الفكرة: في كل موجة، العنق (العنصر النادر اللي الكل محتاجه) ينتقل في
#  السلسلة. مالك العنق (chokepoint) يكسب أكثر من المزاحم (player). نصطاد
#  العنق *القادم* قبل ما ينفجر السعر.
#
#  ⚠️ صدق مهم: هذا تحليل منطقي مبني على معرفة كلود حتى ~مطلع 2026 —
#  احتمالات مرجّحة، **ليست نبوءة ولا بيانات حيّة**. كل سهم هنا يبقى يتفلتر
#  على فلترنا الشرعي + القناعة (سهم يكون عنق ممتاز لكنه حرام = مو لنا).
#
#  status:  acute=العنق الحاد الآن · building=قادم يتشكّل · easing=كان عنق وخفّ · speculative=رهان بعيد
#  prob:    high=مرجّح هيكلياً · med=محتمل · low=مضاربي
#  role في القوائم: chokepoints=مُلّاك العنق (قوة تسعير) · players=متعرّضون لكن مزاحمة · early=بذرة مضاربية
# ════════════════════════════════════════════════════════════════════
meta:
  as_of: "2026-01"
  disclaimer: "تحليل منطقي حتى مطلع 2026 — احتمالات مرجّحة لا نبوءة. حدّثها مع الأخبار وأكّد الحلال."

chains:
  # ───────────────────────────── 1
  - id: ai_power
    name: "طاقة الذكاء الاصطناعي"
    icon: "⚡"
    confidence: high
    thesis: "مراكز بيانات AI تشرب كهرباء هائلة، والشبكة الأمريكية ما تكفي. التوليد القابل للتشغيل دائماً (نووي/غاز) صار أندر مورد في الموجة — العنق انتقل من الشريحة إلى الكهرباء."
    why_us: "أوضح عنق قادم بعد الشرائح. من يملك توليداً نظيفاً مضموناً (نووي خصوصاً) يبيع لمراكز البيانات بعقود طويلة وأسعار صاعدة."
    stages:
      - name: "توليد نووي/كهرباء قابلة للتشغيل دائماً"
        status: acute
        prob: high
        timing: "2025–2029"
        note: "نووي قائم = ذهب: عقود مع مايكروسوفت/أمازون. هذا العنق الحاد فعلاً."
        chokepoints: [CEG, VST]
        players: [NRG, TLN, D, SO]
        early: [OKLO, SMR, NNE]      # مفاعلات صغيرة — قصة، بلا إيرادات بعد
      - name: "توربينات الغاز + معدات الطاقة"
        status: acute
        prob: high
        timing: "2025–2030"
        note: "نقص توربينات الغاز الكبيرة — طلبيات ممتلئة لسنوات."
        chokepoints: [GEV]
        players: [ETN, PWR]
      - name: "وقود اليورانيوم"
        status: building
        prob: high
        timing: "2026–2032"
        note: "إحياء النووي يشدّ اليورانيوم؛ الإمداد متركّز."
        chokepoints: [CCJ]
        players: [LEU]

  # ───────────────────────────── 2
  - id: ai_silicon
    name: "سيليكون الذكاء الاصطناعي"
    icon: "🔲"
    confidence: high
    thesis: "تدريب/تشغيل النماذج يحتاج شرائح + تغليف متقدّم + ذاكرة عالية النطاق (HBM). العنق الحقيقي مو الشريحة نفسها بل التغليف (CoWoS) و HBM — هذي محدودة الطاقة الإنتاجية."
    why_us: "مُلّاك العنق هنا شبه محتكرين (ASML للطباعة، TSMC للتصنيع المتقدّم) — قوة تسعير نادرة."
    stages:
      - name: "معدّات الطباعة الضوئية (EUV)"
        status: acute
        prob: high
        timing: "هيكلي"
        note: "ASML محتكر EUV عالمياً — لا AI متقدّم بدونها. أنظف chokepoint في التقنية."
        chokepoints: [ASML]
        players: [AMAT, LRCX, KLAC]
      - name: "التصنيع + التغليف المتقدّم (CoWoS)"
        status: acute
        prob: high
        timing: "2025–2028"
        note: "TSMC عنق الحافة المتقدّمة + سعة التغليف هي القيد الفعلي على شحنات GPU."
        chokepoints: [TSM]
        players: [AMKR, ONTO]
      - name: "ذاكرة HBM عالية النطاق"
        status: acute
        prob: high
        timing: "2025–2027"
        note: "HBM مباعة مسبقاً بالكامل. SK Hynix الرائد (كوري، غير متاح غالباً)، Micron يلحق."
        chokepoints: [MU]
        players: []
        coverage_note: "أكبر مُلّاك (SK Hynix 000660.KS / Samsung) كوريون — صعب الوصول لهم عبر XTB."
      - name: "المُسرّعات (GPU/ASIC)"
        status: easing
        prob: high
        timing: "يخفّ تدريجياً"
        note: "كان العنق الأول؛ السعة تلحق لكن الحافة لا تزال مشدودة."
        chokepoints: [NVDA]
        players: [AVGO, AMD, ARM]

  # ───────────────────────────── 3
  - id: ai_connect
    name: "ربط وتبريد مراكز البيانات"
    icon: "🔌"
    confidence: high
    thesis: "آلاف الـGPU لازم تتكلّم بسرعة الضوء وتتبرّد. كل ما كبر العنقود، صار الربط الضوئي والتبريد السائل وإدارة الطاقة عنقاً بحد ذاته."
    why_us: "أسهم متوسطة كثير منها (الضوئيات/التبريد) — هنا فرص الصيد قبل ما يلاحظها الجمهور."
    stages:
      - name: "إدارة الطاقة + التبريد السائل"
        status: acute
        prob: high
        timing: "2025–2028"
        note: "Vertiv شبه chokepoint في توزيع الطاقة/التبريد للرفّ."
        chokepoints: [VRT]
        players: [ETN, NVT]
      - name: "الشبكات + الضوئيات"
        status: acute
        prob: high
        timing: "2025–2028"
        note: "تبديل عالي السرعة + وحدات ضوئية — طلب ينفجر مع كل جيل."
        chokepoints: [ANET, AVGO]
        players: [COHR, FN, ALAB, CRDO, LITE]
      - name: "سعة السحابة المتخصّصة (Neocloud)"
        status: building
        prob: med
        timing: "2025–2027"
        note: "يؤجّرون GPU بكثافة — لكن ديونهم عالية والمنافسة تشتد. عنق مؤقت قد يزول."
        chokepoints: []
        players: [CRWV, NBIS, IREN]

  # ───────────────────────────── 4
  - id: electrification
    name: "الكهربة وشبكة الطاقة"
    icon: "🔋"
    confidence: high
    thesis: "AI + السيارات الكهربائية + إعادة التصنيع = طلب كهرباء غير مسبوق على شبكة قديمة. النحاس والمحوّلات ومعدّات الشبكة في عجز هيكلي."
    why_us: "موجة أطول من AI وحده (عقد كامل). النحاس تحديداً عجز إمداد بنيوي."
    stages:
      - name: "النحاس (معدن الكهربة)"
        status: building
        prob: high
        timing: "2026–2032"
        note: "كل كهربة تحتاج نحاس؛ مناجم جديدة تأخذ 10 سنوات. عجز بنيوي."
        chokepoints: [FCX]
        players: [SCCO, TECK]
      - name: "المحوّلات + معدّات الشبكة"
        status: acute
        prob: high
        timing: "2025–2030"
        note: "نقص محوّلات حاد عالمياً — مهلة التسليم بالسنوات."
        chokepoints: [ETN, GEV]
        players: [POWL, HUBB, PWR, NVT]

  # ───────────────────────────── 5
  - id: glp1
    name: "أدوية السمنة (GLP-1)"
    icon: "💉"
    confidence: med
    thesis: "طلب جنوني على أدوية السمنة/السكري؛ العنق هو تصنيع الببتيدات وسعة التعبئة، مو الاكتشاف."
    why_us: "موجة صحية ضخمة — لكن غالب المُلّاك شركات دواء كبيرة، وكثير منها يحتاج فحص حلال دقيق (ديون/أنشطة)."
    stages:
      - name: "تصنيع الببتيدات + التعبئة (CDMO)"
        status: acute
        prob: high
        timing: "2025–2028"
        note: "سعة التصنيع هي القيد. المصنّعون بالعقد يستفيدون من الطرفين."
        chokepoints: []
        players: [LLY, NVO]
        coverage_note: "أنقى الفرص (مصنّعو CDMO) كثير منهم أوروبي/غير مدرج أمريكياً؛ والكبار يحتاجون فحص حلال."

  # ───────────────────────────── 6
  - id: defense
    name: "إعادة التسلّح والدفاع"
    icon: "🛡️"
    confidence: med
    thesis: "حروب + إعادة بناء المخزونات = نقص ذخائر ومعادن نادرة وسعة بناء سفن. عنق صناعي حقيقي."
    why_us: "احتمال هيكلي، لكن الدفاع عندنا = «مراجعة حلال» (محتوى الأنشطة) — يحتاج تأكيد قبل أي شي."
    stages:
      - name: "المعادن النادرة + المغناطيس"
        status: building
        prob: high
        timing: "2026–2032"
        note: "سلاح + كهربة يحتاجان مغناطيس نادر؛ الغرب يحاول كسر احتكار الصين."
        chokepoints: [MP]
        players: []
      - name: "الذخائر + بناء السفن"
        status: acute
        prob: med
        timing: "2025–2030"
        note: "سعة إنتاج محدودة بعد عقود من التقليص."
        chokepoints: []
        players: [LMT, GD, RTX, NOC, HII]
        coverage_note: "الدفاع = مراجعة حلال إلزامية على منصّتنا."

  # ───────────────────────────── 7
  - id: space
    name: "اقتصاد الفضاء"
    icon: "🚀"
    confidence: med
    thesis: "إطلاق رخيص + كوكبات أقمار = عنق في سعة الإطلاق وتصنيع الأقمار. مبكّر لكن ينمو."
    why_us: "أسهم صغيرة عالية المخاطرة — صيد x10 محتمل لكن أغلبها بلا أرباح بعد (نضبط الحصص صغيرة)."
    stages:
      - name: "الإطلاق المداري"
        status: building
        prob: med
        timing: "2026–2030"
        note: "أكبر chokepoint (SpaceX) خاص غير مدرج؛ Rocket Lab المدرج الأبرز."
        chokepoints: [RKLB]
        players: []
        coverage_note: "المهيمن (SpaceX) خاص — غير متاح."
      - name: "الأقمار + الاتصالات الفضائية"
        status: speculative
        prob: low
        timing: "2027+"
        note: "مبكّر جداً ومضاربي — قصص أكثر من أرباح."
        chokepoints: []
        early: [SATL, ASTS]
